<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UK Immigration Statistics | gov.uk tracker</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="container">
    <h1>UK Immigration Visa Statistics Tracker</h1>
    <p>Data automatically collected from <a href="https://www.gov.uk/government/statistical-data-sets/immigration-system-statistics-data-tables" target="_blank">gov.uk</a></p>
    <div id="controls">
        <label>Year: <select id="yearSelect"></select></label>
        <label>Quarter: <select id="quarterSelect"></select></label>
        <label>Visa Type: <select id="typeSelect"></select></label>
        <label>Country: <select id="countrySelect"></select></label>
        <button id="compareBtn">Compare periods</button>
    </div>
    <canvas id="statsChart" width="900" height="400"></canvas>
    <div id="tableContainer"></div>
    <p class="note">This project is opensource and automatically updated with the latest data. <br> Created by zoiruk with GitHub Actions.</p>
</div>
<script src="script.js"></script>
</body>
</html>
